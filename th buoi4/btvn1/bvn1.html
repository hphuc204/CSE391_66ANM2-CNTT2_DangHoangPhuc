<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Đăng Ký Nâng Cấp</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      background: #f7f7f7;
    }

    .container {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .input-wrap {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      font-size: 18px;
    }

    .radio-group,
    .checkbox-group {
      margin-top: 6px;
    }

    .radio-group label,
    .checkbox-group label {
      display: inline-block;
      font-weight: normal;
      margin-right: 14px;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 5px;
      min-height: 18px;
    }

    .counter {
      text-align: right;
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .strength-box {
      margin-top: 8px;
    }

    .strength-bar {
      width: 100%;
      height: 10px;
      background: #e0e0e0;
      border-radius: 999px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .strength-text {
      margin-top: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .success-box {
      display: none;
      text-align: center;
      padding: 30px 20px;
      background: #e8f9ec;
      border: 1px solid #9ad7a5;
      border-radius: 10px;
    }

    .success-box h3 {
      color: green;
      margin-bottom: 10px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #125aa0;
    }
  </style>
</head>
<body>
  <div class="container">
    <form id="registerForm">
      <h2>Form Đăng Ký Tài Khoản</h2>

      <div class="form-group">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" maxlength="50" />
        <div class="counter" id="fullnameCount">0/50</div>
        <div class="error" id="fullnameError"></div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" />
        <div class="error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="phone">Số điện thoại</label>
        <input type="text" id="phone" />
        <div class="error" id="phoneError"></div>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <input type="password" id="password" />
          <span class="toggle-password" id="togglePassword">👁</span>
        </div>

        <div class="strength-box">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-text" id="strengthText">Chưa nhập mật khẩu</div>
        </div>

        <div class="error" id="passwordError"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" />
        <div class="error" id="confirmPasswordError"></div>
      </div>

      <div class="form-group">
        <label>Giới tính</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Nam" /> Nam</label>
          <label><input type="radio" name="gender" value="Nữ" /> Nữ</label>
          <label><input type="radio" name="gender" value="Khác" /> Khác</label>
        </div>
        <div class="error" id="genderError"></div>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="terms" />
            Tôi đồng ý với điều khoản
          </label>
        </div>
        <div class="error" id="termsError"></div>
      </div>

      <button type="submit">Đăng ký</button>
    </form>

    <div class="success-box" id="successBox">
      <h3>Đăng ký thành công!</h3>
      <p>Chào mừng, <strong id="successName"></strong></p>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById("registerForm");
    const successBox = document.getElementById("successBox");
    const successName = document.getElementById("successName");

    const fullname = document.getElementById("fullname");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const terms = document.getElementById("terms");
    const genderRadios = document.querySelectorAll('input[name="gender"]');

    const fullnameCount = document.getElementById("fullnameCount");
    const togglePassword = document.getElementById("togglePassword");
    const strengthFill = document.getElementById("strengthFill");
    const strengthText = document.getElementById("strengthText");

    function showError(fieldId, message) {
      document.getElementById(fieldId + "Error").textContent = message;
    }

    function clearError(fieldId) {
      document.getElementById(fieldId + "Error").textContent = "";
    }

    function updateFullnameCount() {
      fullnameCount.textContent = `${fullname.value.length}/50`;
    }

    function updatePasswordStrength() {
      const value = password.value;
      let score = 0;

      if (value.length >= 8) score++;
      if (/[a-z]/.test(value)) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/\d/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;

      if (value.length === 0) {
        strengthFill.style.width = "0%";
        strengthFill.style.background = "transparent";
        strengthText.textContent = "Chưa nhập mật khẩu";
        strengthText.style.color = "#666";
        return;
      }

      if (score <= 2) {
        strengthFill.style.width = "33%";
        strengthFill.style.background = "red";
        strengthText.textContent = "Yếu";
        strengthText.style.color = "red";
      } else if (score <= 4) {
        strengthFill.style.width = "66%";
        strengthFill.style.background = "orange";
        strengthText.textContent = "Trung bình";
        strengthText.style.color = "orange";
      } else {
        strengthFill.style.width = "100%";
        strengthFill.style.background = "green";
        strengthText.textContent = "Mạnh";
        strengthText.style.color = "green";
      }
    }

    function validateFullname() {
      const value = fullname.value.trim();
      const regex = /^[A-Za-zÀ-ỹ\s]+$/;

      if (value === "") {
        showError("fullname", "Họ và tên không được để trống.");
        return false;
      }

      if (value.length < 3) {
        showError("fullname", "Họ và tên phải có ít nhất 3 ký tự.");
        return false;
      }

      if (!regex.test(value)) {
        showError("fullname", "Họ và tên chỉ được chứa chữ cái và khoảng trắng.");
        return false;
      }

      clearError("fullname");
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (value === "") {
        showError("email", "Email không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("email", "Email không đúng định dạng name@domain.com.");
        return false;
      }

      clearError("email");
      return true;
    }

    function validatePhone() {
      const value = phone.value.trim();
      const regex = /^0\d{9}$/;

      if (value === "") {
        showError("phone", "Số điện thoại không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("phone", "Số điện thoại phải gồm 10 chữ số và bắt đầu bằng 0.");
        return false;
      }

      clearError("phone");
      return true;
    }

    function validatePassword() {
      const value = password.value;
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (value === "") {
        showError("password", "Mật khẩu không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("password", "Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.");
        return false;
      }

      clearError("password");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError("confirmPassword", "Vui lòng nhập xác nhận mật khẩu.");
        return false;
      }

      if (value !== password.value) {
        showError("confirmPassword", "Xác nhận mật khẩu không khớp.");
        return false;
      }

      clearError("confirmPassword");
      return true;
    }

    function validateGender() {
      const checkedGender = document.querySelector('input[name="gender"]:checked');

      if (!checkedGender) {
        showError("gender", "Vui lòng chọn giới tính.");
        return false;
      }

      clearError("gender");
      return true;
    }

    function validateTerms() {
      if (!terms.checked) {
        showError("terms", "Bạn phải đồng ý với điều khoản.");
        return false;
      }

      clearError("terms");
      return true;
    }

    registerForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const isValid =
        validateFullname() &
        validateEmail() &
        validatePhone() &
        validatePassword() &
        validateConfirmPassword() &
        validateGender() &
        validateTerms();

      if (isValid) {
        registerForm.style.display = "none";
        successBox.style.display = "block";
        successName.textContent = fullname.value.trim();
      }
    });

    fullname.addEventListener("blur", validateFullname);
    email.addEventListener("blur", validateEmail);
    phone.addEventListener("blur", validatePhone);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", function () {
      clearError("fullname");
      updateFullnameCount();
    });

    email.addEventListener("input", function () {
      clearError("email");
    });

    phone.addEventListener("input", function () {
      clearError("phone");
    });

    password.addEventListener("input", function () {
      clearError("password");
      updatePasswordStrength();

      if (confirmPassword.value !== "") {
        validateConfirmPassword();
      }
    });

    confirmPassword.addEventListener("input", function () {
      clearError("confirmPassword");
    });

    genderRadios.forEach(function (radio) {
      radio.addEventListener("change", function () {
        clearError("gender");
      });
    });

    terms.addEventListener("change", function () {
      clearError("terms");
    });

    togglePassword.addEventListener("click", function () {
      if (password.type === "password") {
        password.type = "text";
      } else {
        password.type = "password";
      }
    });

    updateFullnameCount();
    updatePasswordStrength();
  </script>
</body>
</html>
