<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-step Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .progress-text {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #ddd;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .progress-fill {
      height: 100%;
      width: 33.33%;
      background: #1976d2;
      transition: width 0.3s ease;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"] {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .radio-group label {
      display: inline-block;
      font-weight: normal;
      margin-right: 16px;
    }

    .error {
      color: red;
      font-size: 14px;
      min-height: 18px;
      margin-top: 5px;
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 18px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-prev {
      background: #757575;
      color: white;
    }

    .btn-next,
    .btn-submit {
      background: #1976d2;
      color: white;
    }

    .btn-prev:hover {
      background: #5c5c5c;
    }

    .btn-next:hover,
    .btn-submit:hover {
      background: #125aa0;
    }

    .summary-box {
      background: #f8fbff;
      border: 1px solid #cfe3ff;
      border-radius: 8px;
      padding: 16px;
      line-height: 1.8;
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 20px;
      background: #e8f9ec;
      border: 1px solid #9ad7a5;
      border-radius: 10px;
      margin-top: 20px;
    }

    .success-message h3 {
      color: green;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Form Đăng Ký Nhiều Bước</h2>

    <div class="progress-text" id="progressText">Bước 1 / 3</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <form id="multiStepForm">
      <!-- BƯỚC 1 -->
      <div class="step active" id="step1">
        <div class="form-group">
          <label for="fullname">Họ tên</label>
          <input type="text" id="fullname" />
          <div class="error" id="fullnameError"></div>
        </div>

        <div class="form-group">
          <label for="birthdate">Ngày sinh</label>
          <input type="date" id="birthdate" />
          <div class="error" id="birthdateError"></div>
        </div>

        <div class="form-group">
          <label>Giới tính</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="Nam" /> Nam</label>
            <label><input type="radio" name="gender" value="Nữ" /> Nữ</label>
            <label><input type="radio" name="gender" value="Khác" /> Khác</label>
          </div>
          <div class="error" id="genderError"></div>
        </div>

        <div class="button-group">
          <div></div>
          <button type="button" class="btn-next" id="next1">Tiếp theo</button>
        </div>
      </div>

      <!-- BƯỚC 2 -->
      <div class="step" id="step2">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" />
          <div class="error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" />
          <div class="error" id="confirmPasswordError"></div>
        </div>

        <div class="button-group">
          <button type="button" class="btn-prev" id="prev2">Quay lại</button>
          <button type="button" class="btn-next" id="next2">Tiếp theo</button>
        </div>
      </div>

      <!-- BƯỚC 3 -->
      <div class="step" id="step3">
        <h3>Xác nhận thông tin</h3>
        <div class="summary-box" id="summaryBox"></div>

        <div class="button-group">
          <button type="button" class="btn-prev" id="prev3">Quay lại</button>
          <button type="submit" class="btn-submit">Đăng ký</button>
        </div>
      </div>
    </form>

    <div class="success-message" id="successMessage">
      <h3>Đăng ký thành công!</h3>
      <p>Bạn đã hoàn tất form nhiều bước.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById("multiStepForm");
    const steps = document.querySelectorAll(".step");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const summaryBox = document.getElementById("summaryBox");
    const successMessage = document.getElementById("successMessage");

    const fullname = document.getElementById("fullname");
    const birthdate = document.getElementById("birthdate");
    const genderRadios = document.querySelectorAll('input[name="gender"]');

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    let currentStep = 1;
    const totalSteps = 3;

    function showError(fieldId, message) {
      document.getElementById(fieldId + "Error").textContent = message;
    }

    function clearError(fieldId) {
      document.getElementById(fieldId + "Error").textContent = "";
    }

    function showStep(stepNumber) {
      steps.forEach((step) => step.classList.remove("active"));
      document.getElementById("step" + stepNumber).classList.add("active");

      progressText.textContent = `Bước ${stepNumber} / ${totalSteps}`;
      progressFill.style.width = `${(stepNumber / totalSteps) * 100}%`;

      currentStep = stepNumber;

      if (stepNumber === 3) {
        renderSummary();
      }
    }

    function validateFullname() {
      const value = fullname.value.trim();
      const regex = /^[A-Za-zÀ-ỹ\s]+$/;

      if (value === "") {
        showError("fullname", "Họ tên không được để trống.");
        return false;
      }

      if (value.length < 3) {
        showError("fullname", "Họ tên phải có ít nhất 3 ký tự.");
        return false;
      }

      if (!regex.test(value)) {
        showError("fullname", "Họ tên chỉ được chứa chữ cái và khoảng trắng.");
        return false;
      }

      clearError("fullname");
      return true;
    }

    function validateBirthdate() {
      const value = birthdate.value;

      if (value === "") {
        showError("birthdate", "Vui lòng chọn ngày sinh.");
        return false;
      }

      const selectedDate = new Date(value);
      const today = new Date();

      if (selectedDate > today) {
        showError("birthdate", "Ngày sinh không được ở tương lai.");
        return false;
      }

      clearError("birthdate");
      return true;
    }

    function validateGender() {
      const checkedGender = document.querySelector('input[name="gender"]:checked');

      if (!checkedGender) {
        showError("gender", "Vui lòng chọn giới tính.");
        return false;
      }

      clearError("gender");
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (value === "") {
        showError("email", "Email không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("email", "Email không đúng định dạng.");
        return false;
      }

      clearError("email");
      return true;
    }

    function validatePassword() {
      const value = password.value;
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (value === "") {
        showError("password", "Mật khẩu không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("password", "Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.");
        return false;
      }

      clearError("password");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError("confirmPassword", "Vui lòng nhập xác nhận mật khẩu.");
        return false;
      }

      if (value !== password.value) {
        showError("confirmPassword", "Xác nhận mật khẩu không khớp.");
        return false;
      }

      clearError("confirmPassword");
      return true;
    }

    function validateStep1() {
      return validateFullname() & validateBirthdate() & validateGender();
    }

    function validateStep2() {
      return validateEmail() & validatePassword() & validateConfirmPassword();
    }

    function renderSummary() {
      const gender = document.querySelector('input[name="gender"]:checked')?.value || "";

      summaryBox.innerHTML = `
        <p><strong>Họ tên:</strong> ${fullname.value.trim()}</p>
        <p><strong>Ngày sinh:</strong> ${birthdate.value}</p>
        <p><strong>Giới tính:</strong> ${gender}</p>
        <p><strong>Email:</strong> ${email.value.trim()}</p>
        <p><strong>Mật khẩu:</strong> ${"*".repeat(password.value.length)}</p>
      `;
    }

    document.getElementById("next1").addEventListener("click", function () {
      if (validateStep1()) {
        showStep(2);
      }
    });

    document.getElementById("next2").addEventListener("click", function () {
      if (validateStep2()) {
        showStep(3);
      }
    });

    document.getElementById("prev2").addEventListener("click", function () {
      showStep(1);
    });

    document.getElementById("prev3").addEventListener("click", function () {
      showStep(2);
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      if (validateStep1() & validateStep2()) {
        form.style.display = "none";
        successMessage.style.display = "block";
      }
    });

    fullname.addEventListener("blur", validateFullname);
    birthdate.addEventListener("blur", validateBirthdate);
    email.addEventListener("blur", validateEmail);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", function () {
      clearError("fullname");
    });

    birthdate.addEventListener("input", function () {
      clearError("birthdate");
    });

    email.addEventListener("input", function () {
      clearError("email");
    });

    password.addEventListener("input", function () {
      clearError("password");
      if (confirmPassword.value !== "") {
        validateConfirmPassword();
      }
    });

    confirmPassword.addEventListener("input", function () {
      clearError("confirmPassword");
    });

    genderRadios.forEach(function (radio) {
      radio.addEventListener("change", function () {
        clearError("gender");
      });
    });
  </script>
</body>
</html>
